{{- $profilePath := joinPath .chezmoi.homeDir ".config/firefox/profiles/default-release" -}}
{{- $installHash := "" -}}
{{- if eq .chezmoi.os "darwin" -}}
{{-   $installHash = mozillaInstallHash "/Applications/Firefox.app/Contents/MacOS" -}}
{{- else if eq .chezmoi.os "linux" -}}
{{-   $installHash = mozillaInstallHash "/usr/lib/firefox" -}}
{{- end -}}

[Profile0]
Name=default-release
IsRelative=0
Path={{ $profilePath }}
Default=1

[General]
StartWithLastProfile=1
Version=2

[Install{{ $installHash }}]
Default={{ $profilePath }}
Locked=1
